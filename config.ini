# LULC Classification Dashboard - Configuration File
# Modify settings here to customize the application

[DISPLAY]
# Page title in browser tab
page_title = LULC Classification Dashboard

# Page icon (emoji)
page_icon = 🛰️

# Layout mode: "wide" or "centered"
layout = wide

# Initial sidebar state: "expanded" or "collapsed"
sidebar_state = expanded

[DATA]
# Base project directory - adjust if your data is in a different location
project_root = D:\LULC_voice

# Available years for analysis
available_years = 2017,2020,2024

# Downscaling factor for processing (0.0-1.0)
# Lower = faster processing, less detail
# Higher = slower processing, more detail
# Default: 0.5 (50% of original resolution)
downscale_factor = 0.5

[CLASSIFICATION]
# Number of land cover classes to identify
num_classes = 7

# K-Means parameters
kmeans_random_state = 42
kmeans_batch_size = 10000
kmeans_n_init = 3

# NDVI normalization parameter (prevents division by zero)
epsilon = 1e-10

[LAND_TYPES]
# Define the 7 land cover classes
# Format: class_id = Name
0 = Forest
1 = Water
2 = Urban
3 = Grassland
4 = Desert
5 = Cropland
6 = Bare Soil

[COLORS]
# Color codes for visualization (Hex format)
# Must have 7 colors matching the 7 land types above
# 0 = Forest (Green)
0 = #228B22

# 1 = Water (Blue)
1 = #1E90FF

# 2 = Urban (Gray)
2 = #A9A9A9

# 3 = Grassland (Lime Green)
3 = #7CFC00

# 4 = Desert (Tan)
4 = #EDC9AF

# 5 = Cropland (Gold)
5 = #FFD700

# 6 = Bare Soil (Brown)
6 = #D2B48C

[VISUALIZATION]
# Figure size for classification maps (width, height)
classification_figsize = (10, 8)

# Figure size for bar charts (width, height)
chart_figsize = (12, 6)

# Map interpolation method
# Options: 'nearest', 'bilinear', 'bicubic', etc.
map_interpolation = nearest

# Display metrics in columns
metrics_columns = 4

# Enable caching for faster subsequent loads
enable_cache = true

[PROCESSING]
# Enable progress indicators (spinners)
show_progress = true

# Processing timeout (seconds) - 0 = no limit
processing_timeout = 0

# Cache size in MB (Streamlit cache)
cache_size_mb = 100

[INTERFACE]
# Show detailed statistics table
show_statistics_table = true

# Show key insights section
show_insights = true

# Show comparison table in year comparison
show_comparison_table = true

# Show change statistics
show_change_stats = true

# Enable export buttons (future feature)
enable_export = false

[PATHS]
# Subdirectory names for each year
# Adjust if your folders have different names
year_2017_dir = 2017
year_2020_dir = 2020
year_2024_dir = 2024

# File naming pattern for band files
# Use wildcards: * matches anything
band_file_pattern_b2 = *_SR_B2.TIF
band_file_pattern_b3 = *_SR_B3.TIF
band_file_pattern_b4 = *_SR_B4.TIF
band_file_pattern_b5 = *_SR_B5.TIF

[EXPERT]
# Advanced settings for experienced users

# Use MiniBatchKMeans (faster) or regular KMeans (more stable)
use_minibatch_kmeans = true

# NDVI band indices (0-indexed)
# Standard: Red=Band 4, NIR=Band 5
# Adjust if using different band configuration
red_band_index = 2
nir_band_index = 3

# Enable debug mode (prints detailed logs)
debug_mode = false

# Maximum image height/width for processing
max_image_dimension = 5000

# Resample method for image alignment
resample_method = order_0

[ABOUT]
# Project version
version = 1.0

# Last updated date
last_updated = February 2026

# Project status
status = Active

# Organization/Author
author = LULC Analysis Team
